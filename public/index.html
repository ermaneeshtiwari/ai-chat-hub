<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artch AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-card">
        <header class="chat-header">
          <h1>Artch AI</h1>
          <p>Switch AI provider and model for each conversation</p>
        </header>
        <section class="chat-toolbar" aria-label="AI settings">
          <div class="control-group">
            <label for="providerSelect">Provider</label>
            <select id="providerSelect" name="provider"></select>
          </div>
          <div class="toolbar-divider"></div>
          <div class="control-group">
            <label for="modelSelect">Model</label>
            <select id="modelSelect" name="model"></select>
          </div>
          <p id="providerHint" class="provider-hint" aria-live="polite"></p>
        </section>
        <div id="chatMessages" class="chat-messages" aria-live="polite">
          <div class="message bot">
            <p>Hello! Ask me anything and I will help you.</p>
          </div>
        </div>
        <form id="chatForm" class="chat-form">
          <label for="messageInput" class="sr-only">Type your message</label>
          <input
            id="messageInput"
            name="message"
            type="text"
            placeholder="Type your message..."
            required
            autocomplete="off"
          />
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>
    </main>
    <!-- Markdown renderer + sanitizer, loaded before app.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
